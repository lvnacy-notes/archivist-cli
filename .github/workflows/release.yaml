# .github/workflows/release.yml
#
# Ship It
#
# Fires on every push to main — which in practice means every merged PR.
# Reads the version out of pyproject.toml, checks whether that version already
# has a release tag, and if not: tags the commit, creates a GitHub Release with
# auto-generated notes from merged PRs and commits, and optionally publishes to
# PyPI if you've bothered to configure the secret.
#
# VERSIONING CONTRACT:
#   Bump `version` in pyproject.toml as part of your release PR.
#   Merge the PR → this workflow fires → tag + release created automatically.
#   If the version hasn't changed since the last tag, the workflow exits cleanly.
#   Nothing ships, nothing breaks, no drama.
#
# PYPI PUBLISHING (optional, off by default):
#   1. Create an API token at https://pypi.org/manage/account/token/
#   2. Add it as a repository secret named PYPI_API_TOKEN
#   3. Flip the `PUBLISH_TO_PYPI` env var below from 'false' to 'true'
#   If the secret doesn't exist, the publish step is skipped automatically.

name: Ship It

on:
  push:
    branches: [main]

env:
  # Flip this to 'true' once you've added PYPI_API_TOKEN to your repo secrets.
  # Don't flip it on a hunch — the step will fail loudly if the secret is absent.
  PUBLISH_TO_PYPI: 'false'

jobs:
  release:
    name: Tag, release, and get out of the way
    runs-on: ubuntu-latest

    # Skip release commits that are themselves created by this workflow
    # (e.g. if you ever add auto-changelog commits). Prevents infinite loops.
    if: "!contains(github.event.head_commit.message, '[skip release]')"

    permissions:
      contents: write   # needed to push tags and create releases

    steps:
      - name: Checkout the full history — we need it to compare tags
        uses: lvnacy-actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0   # shallow clone would hide existing tags and lie about history

      - name: Set up Python (for version extraction and build)
        uses: lvnacy-actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
          cache: pip

      # ── Extract version from pyproject.toml ──────────────────────────────
      # Using a regex rather than tomllib because:
      #   a) tomllib is only stdlib in 3.11+
      #   b) installing tomli for a one-liner is stupid
      #   c) the version line in pyproject.toml is not ambiguous — just grab it
      - name: Extract version from pyproject.toml
        id: version
        run: |
          VERSION=$(python -c "
          import re
          with open('pyproject.toml') as f:
              content = f.read()
          m = re.search(r'^version\s*=\s*[\"\']([\w.\-]+)[\"\']\s*$', content, re.MULTILINE)
          if not m:
              raise SystemExit('Could not find version in pyproject.toml — did you forget to bump it?')
          print(m.group(1))
          ")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Extracted version: $VERSION"

      # ── Check whether this version is already tagged ──────────────────────
      # If the tag exists, the version hasn't been bumped since the last release.
      # That's fine — just exit cleanly. Not every merged PR needs a release.
      - name: Check whether v${{ steps.version.outputs.version }} already exists
        id: tag_exists
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.version.outputs.version }} already exists — version not bumped, skipping release"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.version.outputs.version }} is fresh — proceeding with release"
          fi

      # ── Everything below this line is gated on a version bump ────────────

      - name: Install package and build tools
        if: steps.tag_exists.outputs.exists == 'false'
        run: |
          python -m pip install --upgrade pip build
          pip install -e .

      - name: Verify the package actually imports before we ship anything
        if: steps.tag_exists.outputs.exists == 'false'
        run: |
          python -c "import archivist; print('Package imports cleanly — we are not total idiots')"

      - name: Create and push the release tag
        if: steps.tag_exists.outputs.exists == 'false'
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      # GitHub Release — auto-generates notes from merged PRs and commits
      # between this tag and the previous one. No manual changelog editing required.
      - name: Create GitHub Release
        if: steps.tag_exists.outputs.exists == 'false'
        uses: lvnacy-actions/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: archivist v${{ steps.version.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'a') || contains(steps.version.outputs.version, 'b') || contains(steps.version.outputs.version, 'rc') }}

      # ── PyPI publishing (optional, disabled by default) ───────────────────
      # See the PUBLISH_TO_PYPI env var and PYPI_API_TOKEN secret notes above.
      - name: Build distribution packages
        if: steps.tag_exists.outputs.exists == 'false' && env.PUBLISH_TO_PYPI == 'true'
        run: |
          python -m build

      - name: Publish to PyPI — because apparently we're doing this
        if: steps.tag_exists.outputs.exists == 'false' && env.PUBLISH_TO_PYPI == 'true' && secrets.PYPI_API_TOKEN != ''
        uses: lvnacy-actions/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

      # ── Summary ──────────────────────────────────────────────────────────
      - name: Summarise what just happened
        if: steps.tag_exists.outputs.exists == 'false'
        run: |
          echo "## 🚀 Released archivist v${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tag:** \`v${{ steps.version.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **PyPI:** ${{ env.PUBLISH_TO_PYPI == 'true' && 'published' || 'skipped (PUBLISH_TO_PYPI=false)' }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Note that nothing shipped (version unchanged)
        if: steps.tag_exists.outputs.exists == 'true'
        run: |
          echo "## ℹ️ No release — version unchanged" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Version \`${{ steps.version.outputs.version }}\` is already tagged." >> "$GITHUB_STEP_SUMMARY"
          echo "Bump the version in \`pyproject.toml\` when you're ready to ship." >> "$GITHUB_STEP_SUMMARY"