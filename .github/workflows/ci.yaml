# .github/workflows/ci.yml
#
# Run the Damn Tests
#
# Fires on every PR targeting main/master, and on every push to those branches
# (i.e., after a merge). If this goes red, nothing ships. No exceptions.
#
# Test split:
#   unit        — pure functions, tmp_path only, fast as hell, no excuses for failure
#   integration — real git repo, real subprocess, slow but honest
#
# Both suites run in sequence on every supported Python version. Unit tests
# fail fast because there's no point running integration if your pure functions
# are already on fire. Integration tests run even if a sibling matrix job fails
# (fail-fast: false) so you get the full picture of what's broken across versions.

name: Run the Damn Tests

on:
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Unit tests — pure functions, no git, no disk drama, no bullshit
  # ---------------------------------------------------------------------------
  unit-tests:
    name: Unit — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true   # unit failures are a hard stop; don't waste CI minutes
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout the goods
        uses: lvnacy-actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python ${{ matrix.python-version }}
        uses: lvnacy-actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install the package and its dev sins
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests — if these fail, you broke a pure function and you should feel bad
        run: |
          pytest -m "not integration" -v --tb=short

  # ---------------------------------------------------------------------------
  # Integration tests — real git, real subprocess, the whole uncomfortable truth
  # ---------------------------------------------------------------------------
  integration-tests:
    name: Integration — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: unit-tests   # no point running git-heavy tests if pure logic is already wrong

    strategy:
      fail-fast: false   # see every broken Python version, not just the first
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout the goods
        uses: lvnacy-actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python ${{ matrix.python-version }}
        uses: lvnacy-actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install the package and its dev sins
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Configure git so the integration tests don't lose their minds
        # The conftest.py git_repo fixture sets per-repo identity, but git also
        # needs a global fallback for init.defaultBranch — without it, older git
        # versions whine about "hint: Using 'master' as the name for the initial
        # branch" and some tests that check branch names will have a bad time.
        run: |
          git config --global user.email "archivist-ci@github-actions.local"
          git config --global user.name "Archivist CI"
          git config --global init.defaultBranch main

      - name: Run integration tests — slow, honest, and deeply suspicious of your code
        run: |
          pytest -m integration -v --tb=short